name: Refresh Ideas Dashboard

on:
  schedule:
    # Runs every 2 hours during business hours (Mon-Fri, 8am-8pm CT / 13:00-01:00 UTC)
    - cron: '0 13,15,17,19,21,23,1 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ClickUp data and rebuild dashboard
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: '116394162'
        run: node build-dashboard.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || (git commit -m "Auto-refresh dashboard data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
